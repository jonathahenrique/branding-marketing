# ══════════════════════════════════════════════════════════
#   Brand Factory — Typography Archetype Map
#   Combinacoes de fontes por arquetipo (Google Fonts / Fontshare)
# ══════════════════════════════════════════════════════════

# Todas as fontes sao gratuitas (Google Fonts ou Fontshare)
# Cada arquetipo tem 2-3 combinacoes ranqueadas

combinations:

  especialista:
    - rank: 1
      display: { font: "Space Grotesk", source: "Google Fonts", license: "SIL Open Font", weights: "300, 400, 500, 600, 700", variable: true }
      body: { font: "Inter", source: "Google Fonts", license: "SIL Open Font", weights: "400, 500, 600", variable: true }
      mono: { font: "JetBrains Mono", source: "JetBrains", license: "SIL Open Font", weights: "400", variable: false }
      justification: "Space Grotesk traz modernidade tecnica; Inter e a body font mais legivel do mercado"
    - rank: 2
      display: { font: "Outfit", source: "Google Fonts", license: "SIL Open Font", weights: "400, 500, 600, 700", variable: true }
      body: { font: "Source Sans 3", source: "Google Fonts", license: "SIL Open Font", weights: "400, 500, 600", variable: true }
      mono: { font: "Fira Code", source: "Google Fonts", license: "SIL Open Font", weights: "400", variable: false }
      justification: "Outfit e geometrica e profissional; Source Sans 3 tem heranca Adobe e otima legibilidade"

  rebelde:
