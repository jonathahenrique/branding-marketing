# Type scale padrao (pode ser ajustado por marca)
default_scale:
  - { name: "Hero", desktop: "72px", mobile: "36px", lineHeight: "0.95", font: "heading", weight: "800", letterSpacing: "-0.03em", usage: "Landing hero, campanha" }
  - { name: "H1", desktop: "48px", mobile: "32px", lineHeight: "1.1", font: "heading", weight: "700", letterSpacing: "-0.02em", usage: "Titulos de pagina" }
  - { name: "H2", desktop: "36px", mobile: "24px", lineHeight: "1.2", font: "heading", weight: "700", letterSpacing: "-0.01em", usage: "Secoes principais" }
  - { name: "H3", desktop: "24px", mobile: "20px", lineHeight: "1.3", font: "heading", weight: "600", usage: "Subsecoes, cards" }
  - { name: "H4", desktop: "18px", mobile: "16px", lineHeight: "1.4", font: "heading", weight: "600", usage: "Headers menores" }
  - { name: "Body", desktop: "16px", mobile: "16px", lineHeight: "1.6", font: "body", weight: "400", usage: "Texto corrido" }
  - { name: "Small", desktop: "14px", mobile: "14px", lineHeight: "1.5", font: "body", weight: "400", usage: "Metadados, captions" }
  - { name: "Micro", desktop: "11px", mobile: "11px", lineHeight: "1.4", font: "body", weight: "500", letterSpacing: "0.08em", usage: "Labels, overlines" }
  - { name: "Code", desktop: "14px", mobile: "14px", lineHeight: "1.5", font: "mono", weight: "400", usage: "Codigo, dados tecnicos" }
